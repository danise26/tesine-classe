<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tesine Classe</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:40px;
}
h1{
text-align:center;
}
table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
th{
background:#4a6fa5;
color:white;
padding:12px;
}
td{
padding:10px;
border-bottom:1px solid #ddd;
}
tr:nth-child(even){
background:#f9f9f9;
}
input{
width:100%;
border:none;
padding:6px;
}
select{
width:100%;
padding:6px;
border:none;
}
</style>
</head>
<body>
<h1>Tesine Classe – Gestione studenti</h1>
<table>
<tr>
<th>N°</th>
<th>Studente</th>
<th>Titolo tesina</th>
<th>Materia</th>
<th>Stato</th>
<th>Note</th>
</tr>
<script>
for(let i=1;i<=19;i++){
document.write(`
<tr>
<td>${i}</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td>
<select>
<option>Da definire</option>
<option>Proposta studente</option>
<option>In revisione</option>
<option>Approvato</option>
<option>Titolo definitivo</option>
</select>
</td>
<td><input></td>
</tr>
`)
}
</script>
</table>
</body>
</html>
